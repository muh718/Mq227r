<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الاحتمالات | رياضيات المرحلة الثانوية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap');

        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --correct: #10b981;
            --wrong: #ef4444;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-dark: #1f2937;
            --text-light: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 40px;
            position: relative;
        }

        /* شاشات اللعبة */
        .screen {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }
        .screen.active {
            display: block;
        }

        /* شاشة البداية والنهاية */
        .welcome-screen, .result-screen {
            text-align: center;
        }
        .welcome-screen h1, .result-screen h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        .welcome-screen p, .result-screen p {
            font-size: 1.2rem;
            color: var(--text-light);
            margin-bottom: 30px;
        }
        .start-btn, .restart-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            font-weight: bold;
        }
        .start-btn:hover, .restart-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-3px);
        }

        /* شريط التقدم */
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--text-light);
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* السؤال */
        .lesson-tag {
            background-color: #e0e7ff;
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .question-text {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* الخيارات */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .option-btn {
            background-color: #f9fafb;
            border: 2px solid #e5e7eb;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: right;
            font-weight: bold;
            color: var(--text-dark);
            display: flex;
            align-items: center;
        }
        .option-btn:hover:not(.disabled) {
            border-color: var(--primary);
            background-color: #f0fdf4;
            transform: translateX(-5px);
        }
        .option-btn.correct {
            background-color: var(--correct);
            border-color: var(--correct);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        .option-btn.wrong {
            background-color: var(--wrong);
            border-color: var(--wrong);
            color: white;
            animation: shake 0.4s;
        }
        .option-btn.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* التأثيرات الحركية */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(10px); }
            50% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* تأثير النجوم المتساقطة */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #fcd34d;
            border-radius: 50%;
            z-index: 1000;
            pointer-events: none;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media(max-width: 600px) {
            .container { padding: 20px; }
            .question-text { font-size: 1.2rem; }
            .option-btn { font-size: 1rem; padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="welcomeScreen" class="screen active welcome-screen">
            <h1>🎯 تحدي الاحتمالات</h1>
            <p>لعبة تفاعلية لاختبار معلوماتك في الاحتمالات (مقرر الرياضيات للمرحلة الثانوية). استعد للإجابة على 30 سؤالاً مشوقاً!</p>
            <button class="start-btn" onclick="startGame()">ابدأ التحدي الآن 🚀</button>
        </div>

        <div id="quizScreen" class="screen">
            <div class="progress-header">
                <span>السؤال: <span id="currentQNum">1</span> / 30</span>
                <span>النتيجة: <span id="scoreDisplay">0</span></span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div class="lesson-tag" id="lessonTag">الدرس الأول</div>
            <h2 class="question-text" id="questionText">نص السؤال يظهر هنا؟</h2>
            
            <div class="options-grid" id="optionsContainer">
                </div>
        </div>

        <div id="resultScreen" class="screen result-screen">
            <h1>🏆 انتهى التحدي!</h1>
            <p>لقد أتممت الاختبار بنجاح.</p>
            <h2 style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;">
                <span id="finalScore">0</span> / 30
            </h2>
            <p id="resultMessage" style="font-weight: bold; font-size: 1.5rem;"></p>
            <button class="restart-btn" onclick="restartGame()">إعادة التحدي 🔄</button>
        </div>

    </div>

    <script>
        // قاعدة بيانات الأسئلة المستخرجة حصرياً من الملف
        const questions = [
            // الدرس 1-7: تمثيل فضاء العينة
            { lesson: "تمثيل فضاء العينة", text: "ما هو الإجراء الذي نعرف مسبقاً جميع نواتجه الممكنة؟", options: ["الحادثة", "التجربة العشوائية", "الاحتمال المشروط", "مبدأ العد الأساسي"], correctIndex: 1 },
            { lesson: "تمثيل فضاء العينة", text: "ما هو 'فضاء العينة' لتجربة ما؟", options: ["مجموعة جميع النواتج الممكنة", "نتيجة واحدة أو أكثر", "ترتيب العناصر خطياً", "الاحتمال الهندسي للتجربة"], correctIndex: 0 },
            { lesson: "تمثيل فضاء العينة", text: "أي من التالي ليس من طرق تمثيل فضاء العينة المذكورة في الكتاب؟", options: ["القائمة المنظمة", "الرسم الشجري", "الجدول", "التكامل المزدوج"], correctIndex: 3 },
            { lesson: "تمثيل فضاء العينة", text: "يمكن إيجاد عدد النواتج الممكنة بضرب عدد النواتج في كل مرحلة من مراحل التجربة. هذا يُعرف بـ:", options: ["التباديل الدائرية", "مبدأ العد الأساسي", "قانون الاحتمال الهندسي", "قانون الحوادث المتنافية"], correctIndex: 1 },
            { lesson: "تمثيل فضاء العينة", text: "ألقيت قطعة نقد مرة واحدة، ثم رُمي مكعب مرقم مرة واحدة. ما عدد النواتج الممكنة؟", options: ["8", "12", "36", "2"], correctIndex: 1 },
            { lesson: "تمثيل فضاء العينة", text: "إذا كان لدى شخص خيارات لثوب: 5 أنواع قماش، 6 ألوان، 3 أكمام، 3 قبات، 2 فتحة، 2 أزرار. فما عدد الخيارات المتاحة؟ (5×6×3×3×2×2)", options: ["1080", "1200", "540", "36"], correctIndex: 0 },
            
            // الدرس 2-7: الاحتمال باستعمال التباديل والتوافيق
            { lesson: "التباديل والتوافيق", text: "ما هي قيمة مضروب الصفر (0!) بناءً على الاتفاق الرياضي؟", options: ["0", "غير معرف", "1", "10"], correctIndex: 2 },
            { lesson: "التباديل والتوافيق", text: "تنظيم لمجموعة من العناصر يكون (الترتيب فيه مهماً) يسمى:", options: ["التوافيق", "الفضاء العيني", "التباديل", "مبدأ العد"], correctIndex: 2 },
            { lesson: "التباديل والتوافيق", text: "اختيار مجموعة من العناصر بحيث يكون (الترتيب فيها غير مهم) يسمى:", options: ["التوافيق", "التباديل الدائرية", "الاحتمال المشروط", "الرسم الشجري"], correctIndex: 0 },
            { lesson: "التباديل والتوافيق", text: "ما هو عدد التباديل المختلفة لـ n من العناصر المرتبة على شكل دائرة (بدون نقطة مرجعية)؟", options: ["n!", "(n-1)!", "n", "n / 2"], correctIndex: 1 },
            { lesson: "التباديل والتوافيق", text: "عند حساب عدد التباديل المختلفة لعناصر يتكرر بعضها، نقسم مضروب العدد الكلي على:", options: ["مضروب تكرار كل عنصر", "عدد العناصر المتبقية", "مجموع العناصر", "2"], correctIndex: 0 },
            { lesson: "التباديل والتوافيق", text: "مجلس إدارة من 10 أعضاء. ما احتمال اختيار فيصل رئيساً ومحمد نائباً ومهند أميناً للسر عشوائياً؟ (استعمال التباديل 10P3)", options: ["1/10", "1/720", "1/120", "1/3"], correctIndex: 1 },

            // الدرس 3-7: الاحتمال الهندسي
            { lesson: "الاحتمال الهندسي", text: "إذا احتوت القطعة المستقيمة AD القطعة المستقيمة BC، فاختيرت نقطة عشوائياً على AD، فإن احتمال وقوعها على BC يساوي:", options: ["طول AD / طول BC", "طول AB / طول CD", "طول BC / طول AD", "1"], correctIndex: 2 },
            { lesson: "الاحتمال الهندسي", text: "في الاحتمال والمساحة: احتمال وقوع نقطة E في المنطقة B الموجودة داخل المنطقة A يساوي:", options: ["مساحة A / مساحة B", "مساحة B / مساحة A", "محيط B / محيط A", "مساحة A × مساحة B"], correctIndex: 1 },
            { lesson: "الاحتمال الهندسي", text: "نسبة مساحة قطاع في دائرة إلى مساحة الدائرة الكلية كنسبة قياس زاويته المركزية (x) إلى:", options: ["180", "90", "360", "100"], correctIndex: 2 },
            { lesson: "الاحتمال الهندسي", text: "تصل حافلة كل 30 دقيقة. إذا وصل راكب، ما احتمال أن ينتظر 10 دقائق أو أكثر (أي طول فترة الانتظار 20 دقيقة)؟", options: ["1/3", "2/3", "1/2", "3/4"], correctIndex: 1 },
            { lesson: "الاحتمال الهندسي", text: "قرص دوار به قطاع أصفر زاويته 45 درجة. ما احتمال استقرار المؤشر على اللون الأصفر؟ (45/360)", options: ["12.5%", "25%", "50%", "30%"], correctIndex: 0 },
            { lesson: "الاحتمال الهندسي", text: "هبط مظلي على هدف دوائر متحدة المركز. مساحة الهدف الكلي 9π والمنطقة الحمراء مساحتها π. احتمال الهبوط في الحمراء هو:", options: ["1/3", "1/9", "π/3", "1/2"], correctIndex: 1 },

            // الدرس 4-7: الحوادث المستقلة وغير المستقلة
            { lesson: "الحوادث المستقلة وغير المستقلة", text: "كيف نميز الحادثتين المستقلتين؟", options: ["لا توجد نواتج مشتركة بينهما", "احتمال حدوث الأولى لا يؤثر في احتمال حدوث الثانية", "احتمال حدوث الأولى يغير احتمال حدوث الثانية", "لا يمكن وقوعهما معاً"], correctIndex: 1 },
            { lesson: "الحوادث المستقلة وغير المستقلة", text: "سحب بطاقة من صندوق دون إرجاعها، ثم سحب بطاقة ثانية. هاتان حادثتان:", options: ["مستقلتان", "بسيطتان", "متنافيتان", "غير مستقلتين"], correctIndex: 3 },
            { lesson: "الحوادث المستقلة وغير المستقلة", text: "احتمال وقوع حادثتين مستقلتين A و B معاً يساوي:", options: ["P(A) + P(B)", "P(A) - P(B)", "P(A) × P(B)", "P(A) / P(B)"], correctIndex: 2 },
            { lesson: "الحوادث المستقلة وغير المستقلة", text: "الرمز P(B|A) يُقرأ: احتمال وقوع الحادثة B بشرط وقوع الحادثة A. ويسمى:", options: ["الاحتمال الهندسي", "الاحتمال المتنافي", "الاحتمال المشروط", "الاحتمال التجريبي"], correctIndex: 2 },
            { lesson: "الحوادث المستقلة وغير المستقلة", text: "صندوق به 24 بطاقة ملونة. سحب 3 بطاقات حمراء (عددها 6) دون إرجاع. هذه الحوادث تعتبر:", options: ["حوادث متنافية", "حوادث مستقلة", "حوادث مشروطة وغير مستقلة", "لا يمكن حسابها"], correctIndex: 2 },
            { lesson: "الحوادث المستقلة وغير المستقلة", text: "رمي مكعب مرقم للحصول على عدد زوجي، ثم إدارة مؤشر قرص. هاتان الحادثتان:", options: ["غير مستقلتين", "مستقلتان", "متنافيتان", "مستحيلتان"], correctIndex: 1 },

            // الدرس 5-7: احتمالات الحوادث المتنافية
            { lesson: "الحوادث المتنافية", text: "الحادثتان اللتان لا يمكن وقوعهما في الوقت نفسه (لا توجد نواتج مشتركة بينهما) تسميان:", options: ["حادثتين مستقلتين", "حادثتين مشروطتين", "حادثتين متنافيتين", "حادثتين غير متنافيتين"], correctIndex: 2 },
            { lesson: "الحوادث المتنافية", text: "الحصول على المجموع 6 أو المجموع 7 عند رمي مكعبين مرقمين يمثل حادثتين:", options: ["مستقلتين", "غير متنافيتين", "متنافيتين", "متتيزتين"], correctIndex: 2 },
            { lesson: "الحوادث المتنافية", text: "قانون احتمال الحادثتين المتنافيتين P(A أو B) يساوي:", options: ["P(A) × P(B)", "P(A) + P(B)", "P(A) - P(B)", "P(A) ÷ P(B)"], correctIndex: 1 },
            { lesson: "الحوادث المتنافية", text: "تتكون من جميع نواتج فضاء العينة غير الموجودة في الحادثة A، ويُرمز لها بـ P(A').", options: ["الحادثة المشروطة", "الحادثة المستقلة", "الحادثة المركبة", "الحادثة المتممة"], correctIndex: 3 },
            { lesson: "الحوادث المتنافية", text: "إذا كان احتمال هطول المطر 70%، فما احتمال عدم هطوله؟", options: ["100%", "30%", "70%", "0%"], correctIndex: 1 },
            { lesson: "الحوادث المتنافية", text: "اختيار عدد من 1 إلى 100 عشوائياً، ليكون يقبل القسمة على 5 أو يقبل القسمة على 10. هاتان الحادثتان:", options: ["غير متنافيتين", "متنافيتان", "مستحيلتان", "مستقلتان"], correctIndex: 0 }
        ];

        let currentIndex = 0;
        let score = 0;
        let isAnswered = false;

        const screens = {
            welcome: document.getElementById('welcomeScreen'),
            quiz: document.getElementById('quizScreen'),
            result: document.getElementById('resultScreen')
        };

        function switchScreen(screenKey) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[screenKey].classList.add('active');
        }

        function startGame() {
            currentIndex = 0;
            score = 0;
            updateProgress();
            loadQuestion();
            switchScreen('quiz');
        }

        function loadQuestion() {
            isAnswered = false;
            const q = questions[currentIndex];
            
            document.getElementById('currentQNum').innerText = currentIndex + 1;
            document.getElementById('lessonTag').innerText = `📚 ${q.lesson}`;
            document.getElementById('questionText').innerText = q.text;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (isAnswered && btnElement.classList.contains('disabled')) return;
            
            const q = questions[currentIndex];
            const allButtons = document.querySelectorAll('.option-btn');

            if (selectedIndex === q.correctIndex) {
                // إجابة صحيحة
                isAnswered = true;
                btnElement.classList.add('correct');
                score++;
                document.getElementById('scoreDisplay').innerText = score;
                createConfetti();
                
                // تعطيل باقي الأزرار
                allButtons.forEach(b => b.classList.add('disabled'));

                // الانتقال للسؤال التالي تلقائياً
                setTimeout(() => {
                    nextQuestion();
                }, 1500);
            } else {
                // إجابة خاطئة
                btnElement.classList.add('wrong');
                btnElement.classList.add('disabled');
            }
        }

        function nextQuestion() {
            currentIndex++;
            updateProgress();

            if (currentIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function updateProgress() {
            const progress = (currentIndex / questions.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }

        function showResults() {
            document.getElementById('finalScore').innerText = score;
            const msgObj = document.getElementById('resultMessage');
            
            if (score >= 25) {
                msgObj.innerText = "أنت عبقري في الاحتمالات! 🌟 ممتاز جداً!";
                msgObj.style.color = "var(--correct)";
            } else if (score >= 15) {
                msgObj.innerText = "أداء جيد! 👍 استمر في التدرب لتصبح الأفضل.";
                msgObj.style.color = "var(--primary)";
            } else {
                msgObj.innerText = "حاول مرة أخرى 📚 الممارسة تصنع التفوق.";
                msgObj.style.color = "var(--wrong)";
            }
            
            switchScreen('result');
        }

        function restartGame() {
            startGame();
        }

        // تأثيرات بصرية - نجوم متساقطة
        function createConfetti() {
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = ['#fcd34d', '#34d399', '#60a5fa', '#f472b6'][Math.floor(Math.random() * 4)];
                confetti.style.animationDuration = (Math.random() * 1 + 1) + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.remove();
                }, 2000);
            }
        }
    </script>
</body>
</html>
